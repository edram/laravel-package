name: format

on:
  push:
    paths:
      - '**.php'
      - 'composer.json'
      - '.github/workflows/format.yml'
  pull_request:
    paths:
      - '**.php'
      - 'composer.json'
      - '.github/workflows/format.yml'

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Run Pint
        run: vendor/bin/pint --test
